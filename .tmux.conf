# {{{ basic options
# set prefix to c-a
unbind-key C-b
set -g prefix C-a

# pseudo second prefix, M-a
# M-a mapped to use mappings from `keys-2` key table, for one keystroke
bind-key -n M-a switch-client -T keys-2

# also, see this example from the manual for using multiple key tables
#   - bind-key -Ttable2 c list-keys
#   - bind-key -Ttable1 b switch-client -Ttable2
#   - bind-key -Troot   a switch-client -Ttable1

# don't rename windows automatically
set-option -g allow-rename off

set-option -g default-shell $SHELL

# these items are from https://github.com/tmux-plugins/tmux-sensible or of my own tweaking
# reduce escape time to 1ms
# note that this may result in _some_ missed <meta>+key sequences
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# how often to update the status, seconds
set -g status-interval 60 # default 15

# act like vim
set -wg mode-keys vi
set -g status-keys vi

# Enable events firing on terminal focus etc.
set -g focus-events on

# Resize windows related to smallest / largest window
set -wg aggressive-resize on

# Set ability to capture on start and restore on exit window data when running an application
set -wg alternate-screen on

set -g visual-activity off
set -g visual-bell off
set -g visual-silence on

# turn on mouse support
set -g mouse on

# allow bypassing tmux with a special code
set -g allow-passthrough on

# attach to another session when session is destroyed
set -g detach-on-destroy off

# start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1

# renumber windows on closing
set-option -g renumber-windows on

# Don't change tmux's own window titles
set -w -g automatic-rename off

# make scrolling with wheels work
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M
# }}}
# {{{ navigation, splitting of panes, windows
# navigate between vim and tmux, no plugin required
# checks for "not_tmux" so that j and k nav work inside of e.g. fzf when run via `v c-t`
not_tmux="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|fzf)$'"
bind-key -n C-h if-shell "$not_tmux" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$not_tmux" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$not_tmux" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$not_tmux" "send-keys C-l"  "select-pane -R"

# vim style window selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# note, -r to support repeating a key
# next/prev window
bind-key -r C-p previous-window
bind-key -r C-n next-window

# swap pane, left and right
bind-key -r "<" swap-pane -U
bind-key -r ">" swap-pane -D

# swap window, left and right
unbind-key ,
bind-key -r , swap-window -t -1\; select-window -t -1
unbind-key .
bind-key -r . swap-window -t +1\; select-window -t +1

# rename window, usually `,`
unbind-key r
bind-key r command-prompt -I "#W" "rename-window '%%'"

# alternate window splitting keys, open splits with the current path
unbind-key %
bind-key | split-window -h -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'

# balance vertically
# tmux select-layout even-horizontal / even-vertical
bind-key '=' select-layout even-horizontal

# resize panes
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# kill a pane
bind-key C-x kill-pane
# }}}
# {{{ other mappings
# output ctrl-a with ctrl-a a
bind-key a send-keys C-a

# kill a session via ctrl-q, with confirmation
bind-key C-q confirm-before -p "kill-session #S? (y/n)" kill-session

# reload config
bind-key C-r source-file ~/.tmux.conf \; display-message "** tmux.conf reloaded **"

# show mappings
unbind-key m
bind-key m run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/keys.sh Mappings"

# jump to last window, in any session
unbind-key Space
bind-key Space run-shell 'zsh -c "$HOME/.config/tmux/last.sh switch"'
set-hook -g pane-focus-out 'run-shell "zsh -c \"$HOME/.config/tmux/last.sh out #{session_name} #{window_name} #{pane_index}\""'
# }}}
# {{{ sesh settings
# bind keys to frequently used things
bind-key B run-shell 'zsh -c "$HOME/.config/tmux/sesh.sh auto mwblog $(echo ~blog)"'
bind-key C run-shell 'zsh -c "$HOME/.config/tmux/sesh.sh auto config $(echo ~/.config)"'
bind-key Z run-shell 'zsh -c "$HOME/.config/tmux/sesh.sh auto zettels $(echo ~z)"'
bind-key M run-shell 'zsh -c "$HOME/.config/tmux/sesh.sh auto majyk $(echo ~m)"'
# note: local conf may define sesh items

# general sesh project selector
bind-key S run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/projects.sh Select"
# }}}
# {{{ pop-ups and similar
# open up a tree picker in a popup via c-a
unbind-key C-a
bind-key C-a run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/tree_picker.sh Picker"

# cheat sheet
unbind-key ?
bind-key ? run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/chtsht.sh Cheatsheet"

# hooks for tree picker rebuilding
set-hook -g after-new-window 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g after-rename-window 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g after-rename-session 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g after-new-session 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g session-renamed 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g window-renamed 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g session-created 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'
set-hook -g session-closed 'run-shell "zsh -c \"$HOME/.config/tmux/tree_rebuild.sh 1\""'

# open up yazi in a new _window_ (pop-up has issues with images)
unbind-key y
bind-key y run-shell 'tmux new-window -c "#{pane_current_path}" yazi'

# open htop in a pop-up
unbind-key t
bind-key t run-shell "$HOME/.config/tmux/popup.sh btop Top '-p 1'"

# open fkill in a pop-up
unbind-key X
bind-key X run-shell "$HOME/.config/tmux/popup.sh fkill Kill"

# lazygit pop-up via c-i ... note that c-i is mapped to C PageUp via karabiner when in kitty
bind-key C-PPage run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/lazygit.sh Lazygit '\"#{pane_current_path}\"'"

# lazydocker pop-up
unbind-key D
bind-key D run-shell "$HOME/.config/tmux/popup.sh lazydocker Docker"

# dotfiles lazygit
bind-key Y run-shell "$HOME/.config/tmux/popup.sh $HOME/.config/tmux/lazygit_yadm.sh Lazygit"

# general scratch popup, persists
bind-key u run-shell "$HOME/.config/tmux/popup.sh persist scratch '-c $HOME/tmp/empty'"

# agent popup, persists
unbind-key \;
bind-key \; run-shell "$HOME/.config/tmux/popup.sh persist claude $HOME/.config/tmux/agent-claude.sh"

# second agent popup, persists
unbind-key \'
bind-key \' run-shell "$HOME/.config/tmux/popup.sh persist opencode $HOME/.config/tmux/agent-opencode.sh"

# popup handling
# kill popups if no other types
# note the -a to append this hook to the previous defn of this hook
set-hook -ag session-closed 'run-shell "zsh -c \"$HOME/.config/tmux/kill_popups.sh\""'
# when first opening the popup, run a script, nice escaping!
set-hook -g after-new-session 'if -F "#{=~:#{session_name},_popup_}" "run-shell \"zsh -c \\\"$HOME/.config/tmux/.tmux.conf.popup\\\" \""'
# }}}
# {{{ terminal specific settings
# use the xterm-kitty terminfo
set -g default-terminal "xterm-kitty"

# turn on 24bit colour
set -ga terminal-overrides ",xterm-kitty:Tc"

# enable underlines etc.
set -ga terminal-overrides ",xterm-kitty:smxx=\\033[9m"

# enable clipboard support, not sure if needed but hey
set -as terminal-features ',xterm-kitty:clipboard'

# undercurl support with colours
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# allow kitty to listen to things from inside tmux
set -ga update-environment 'KITTY_LISTEN_ON'

# recognise extended keys
set -ga extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm-kitty*:extkeys'

# pass through specific keys from kitty > tmux > nvim
# ... I think this can be done via `extended-keys-format` csi-u and nothing else, but, the below works
# note that that the keys are uppercase, C-S-p doesn't work
# see https://en.wikipedia.org/wiki/ASCII for reference
bind-key -T root C-Enter send-keys Escape "[13;5u"
bind-key -T root S-Enter send-keys Escape "[13;2u"
bind-key -T root C-/ send-keys Escape "[47;5u"
bind-key -T root C-, send-keys Escape "[44;5u"
bind-key -T root C-. send-keys Escape "[46;5u"
bind-key -T root C-[ send-keys Escape "[91;5u"
bind-key -T root C-S-P send-keys Escape "[80;6u"
bind-key -T root C-S-O send-keys Escape "[79;6u"
bind-key -T root C-S-J send-keys Escape "[74;6u"

# update the title on focus change, shown in sketchybar
# note: not bothering to update sketchybar after this, that can lag
set-hook -g pane-focus-in 'run-shell "zsh -c \"kitty @ set-window-title ''#{session_name} / #{window_name}''\""'
# }}}
# {{{ copy mode mapping
# vim like copy pasta
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi 'V' send -X select-line
# on yank, send through `pbcopy` to put into system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# allow bypassing tmux via special escape sequence
# go up and down through prompts
# requires OSC 133 injected into the prompt, see starship config
bind-key -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}

bind-key -T copy-mode-vi -r i {
  send-keys -X next-prompt
}

# select command output, from last prompt, shift+o
bind-key -T copy-mode-vi -r O {
  copy-mode -H
  send -X clear-selection
  send -X start-of-line
  send-keys -X previous-prompt
  send -X cursor-down
  send -X begin-selection
  send-keys -X next-prompt
  send -X cursor-up
  send -X stop-selection
}

# select last command, shift+c
bind-key -T copy-mode-vi -r C {
  copy-mode -H
  send -X clear-selection
  send -X start-of-line
  send -X cursor-up
  send -X cursor-up
  send-keys -X previous-prompt
  send -X search-forward-text ">"
  send -X -N 2 cursor-right
  send -X begin-selection
  send -X search-forward-text "   "
  send -X stop-selection
}
